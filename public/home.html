<!doctype html>
<html lang="vi" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Chủ</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link rel="stylesheet" href="/public/CSS/home.css">
    <style>
        body {
            box-sizing: border-box;
        }
    </style>
</head>

<body class="h-full">
    <div class="app-container"><!-- Header -->
        <header class="header">
            <div class="header-left"><button class="header-btn menu-btn" id="menuBtn" aria-label="Menu">
                    <div class="menu-icon"><span></span> <span></span>
                    </div>
                </button>
                <div class="logo" id="logoBtn" aria-label="Home">
                    <div class="logo-placeholder">
                        <svg viewbox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                            <polyline points="9 22 9 12 15 12 15 22" />
                        </svg>
                    </div>
                </div>
            </div><!-- Search Container (Hidden by default) -->
            <div class="search-container" id="searchContainer"><button class="search-close" id="searchClose" aria-label="Đóng tìm kiếm">
                    <svg viewbox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg></button> <input type="text" class="search-input" placeholder="Tìm kiếm..." id="searchInput">
            </div>
            <div class="header-right" id="headerRight"><button class="header-btn search-btn" id="searchBtn" aria-label="Tìm kiếm">
                    <svg viewbox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg></button> <button class="header-btn notification-btn" id="notificationBtn" aria-label="Thông báo">
                    <svg viewbox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                    </svg><span class="notification-badge" id="notificationBadge"></span> </button> <button class="avatar-btn" id="avatarBtn" aria-label="Tài khoản">
                    <div class="avatar-placeholder">
                        <svg viewbox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                    </div>
                </button>
            </div><!-- Avatar Dropdown -->
            <div class="dropdown avatar-dropdown" id="avatarDropdown">
                <div class="avatar-dropdown-header">
                    <div class="dropdown-avatar">
                        <div class="avatar-placeholder">
                            <svg viewbox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                                <circle cx="12" cy="7" r="4" />
                            </svg>
                        </div>
                    </div>
                    <div class="dropdown-user-info">
                        <div class="dropdown-user-name" id="displayName">
                            Nguyễn Văn A
                        </div>
                        <div class="dropdown-user-email" id="displayEmail">
                            user@example.com
                        </div>
                    </div>
                </div>
                <div class="dropdown-divider"></div>
                <div class="dropdown-menu" id="avatarMenu"></div>
                <div class="dropdown-divider"></div>
                <div class="dropdown-menu-item logout" id="logoutBtn">
                    <svg viewbox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg><span>Đăng xuất</span>
                </div>
            </div><!-- Notification Dropdown -->
            <div class="dropdown notification-dropdown" id="notificationDropdown">
                <div class="notification-header">
                    Thông báo
                </div>
                <div class="notification-list" id="notificationList"></div>
                <div class="notification-footer">
                    <div class="dropdown-divider" style="margin: 0 0 12px 0;"></div><a id="viewAllNotifications">Xem tất cả thông báo...</a>
                </div>
            </div>
        </header><!-- Side Menu Overlay -->
        <div class="side-menu-overlay" id="sideMenuOverlay"></div><!-- Side Menu -->
        <nav class="side-menu" id="sideMenu"></nav><!-- Main Content -->
        <main class="main-content">
            <div id="main-content"></div>
        </main><!-- Bottom Bar -->
        <nav class="bottom-bar" id="bottomBar"></nav>
    </div>
    <script src="/public/JS/home.js"></script>
</body>

</html>
