<!doctype html>

<html lang="vi" class="h-full" data-theme="light">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Auth</title>
        <script src="https://cdn.tailwindcss.com/3.4.17"></script>
        <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
        <link rel="stylesheet" href="/public/CSS/auth.css">
    </head>

    <body class="h-full">

        <!-- Video Background -->
        <video class="video-bg" id="bgVideo" autoplay muted loop playsinline>
            <source src="https://videos.pexels.com/video-files/3129671/3129671-uhd_2560_1440_30fps.mp4" type="video/mp4">
        </video>
        <div class="video-overlay" id="bgOverlay"></div>

        <!-- Toast Container -->
        <div class="toast-container" id="toastContainer"></div>

        <!-- Main -->
        <div class="app-wrapper">
            <div class="auth-card" id="authCard">
                
                <!-- Theme Toggle -->
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode"></button>
                
                <!-- Logo -->
                <div class="logo-placeholder" id="logoWrap">
                    <svg width="28" height="28" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
                    </svg>
                </div>
                
                <!-- Tabs -->
                <div class="tabs-container">
                    <button class="tab-btn active" data-tab="login">
                        Đăng nhập
                    </button>

                    <button class="tab-btn" data-tab="register">
                        Đăng ký
                    </button>
                </div>
                
                <!-- ===== LOGIN TAB ===== -->
                <div class="tab-panel active" id="panel-login">
                    <h2 style="font-size:22px;font-weight:800;margin-bottom:4px;color:var(--text-primary);transition:color .3s" id="loginTitle">
                        Chào mừng trở lại
                    </h2>
                    <p style="font-size:14px;color:var(--text-secondary);margin-bottom:24px;transition:color .3s" id="loginSubtitle">
                        Đăng nhập để tiếp tục
                    </p>
                    <form id="loginForm" onsubmit="return false">
                        <div class="form-group">
                            <label for="loginEmail">
                                Email hoặc Username
                            </label>

                            <input class="form-input" type="text" id="loginEmail" placeholder="you@example.com" autocomplete="username">
                        </div>
                        <div class="form-group">
                            <label for="loginPw">
                                Mật khẩu
                            </label>

                            <input class="form-input" type="password" id="loginPw" placeholder="••••••••" autocomplete="current-password" style="padding-right:42px">

                            <button type="button" class="pw-toggle" data-target="loginPw" aria-label="Show password">
                                <i data-lucide="eye" style="width:18px;height:18px"></i>
                            </button>
                        </div>
                        <div class="form-footer">
                            <label class="check-label">
                                <input type="checkbox" id="loginRemember">
                                <span class="custom-checkbox">
                                    <svg width="12" height="12" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                        <polyline points="20 6 9 17 4 12" />
                                    </svg>
                                </span>
                                Nhớ tôi
                            </label>
                            <a href="#" class="form-link" onclick="event.preventDefault();showToast('Tính năng đang phát triển','info')">
                                Quên mật khẩu?
                            </a>
                        </div>
                        <button type="submit" class="btn-primary" id="loginBtn">Đăng nhập</button>
                    </form>

                    <div class="or-divider">
                        Hoặc đăng nhập với
                    </div>

                    <div class="social-row">
                        <button class="social-btn" onclick="showToast('Google Login — Demo','info')">
                            <svg viewbox="0 0 24 24">
                                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4" />
                                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853" />
                                <path d="M5.84 14.09a6.97 6.97 0 0 1 0-4.17V7.07H2.18a11.01 11.01 0 0 0 0 9.86l3.66-2.84z" fill="#FBBC05" />
                                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335" />
                            </svg> Google 
                        </button>
                        
                        <button class="social-btn" onclick="showToast('Discord Login — Demo','info')">
                            <svg viewbox="0 0 24 24" fill="#5865F2">
                                <path d="M20.317 4.37a19.79 19.79 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.74 19.74 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.11 13.11 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.3 12.3 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.84 19.84 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.06.06 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.333-.947 2.418-2.157 2.418z" />
                            </svg> Discord 
                        </button>
                    </div>
                </div>
                
                <!-- ===== REGISTER TAB ===== -->
                <div class="tab-panel" id="panel-register">
                    <h2 style="font-size:22px;font-weight:800;margin-bottom:4px;color:var(--text-primary);transition:color .3s" id="registerTitle">
                        Tạo tài khoản mới
                    </h2>

                    <p style="font-size:14px;color:var(--text-secondary);margin-bottom:24px;transition:color .3s" id="registerSubtitle">
                        Tham gia cùng chúng tôi hôm nay
                    </p>

                    <form id="registerForm" onsubmit="return false">
                        <div class="form-group">
                            <label for="regUser">
                                Username
                            </label>
                            <input class="form-input" type="text" id="regUser" placeholder="johndoe" autocomplete="username">
                        </div>
                        <div class="form-group">
                            <label for="regEmail">
                                Email
                            </label>
                            
                            <input class="form-input" type="email" id="regEmail" placeholder="you@example.com" autocomplete="email">
                        </div>
                        <div class="form-group">
                            <label for="regPw">
                                Mật khẩu
                            </label>

                            <input class="form-input" type="password" id="regPw" placeholder="••••••••" autocomplete="new-password" style="padding-right:42px">
                            
                            <button type="button" class="pw-toggle" data-target="regPw" aria-label="Show password">
                                <i data-lucide="eye" style="width:18px;height:18px"></i>
                            </button>

                            <div class="strength-bar" id="strengthBar">
                                <div class="strength-segment" id="seg0"></div>
                                <div class="strength-segment" id="seg1"></div>
                                <div class="strength-segment" id="seg2"></div>
                                <div class="strength-segment" id="seg3"></div>
                            </div>

                            <div class="strength-label" id="strengthLabel"></div>
                        </div>
                        <div class="form-group">
                            <label for="regPwConfirm">
                                Xác nhận mật khẩu
                            </label>
                            <input class="form-input" type="password" id="regPwConfirm" placeholder="••••••••" autocomplete="new-password" style="padding-right:42px">
                            
                            <button type="button" class="pw-toggle" data-target="regPwConfirm" aria-label="Show password">
                                <i data-lucide="eye" style="width:18px;height:18px"></i>
                            </button>

                            <div class="match-msg" id="matchMsg"></div>
                        </div>
                        <div class="terms-check">
                            <label class="check-label">
                                <input type="checkbox" id="termsCheck">
                                <span class="custom-checkbox">
                                    <svg width="12" height="12" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                        <polyline points="20 6 9 17 4 12" />
                                    </svg>
                                </span> Tôi đồng ý với
                                <a href="#" class="form-link" onclick="event.preventDefault()" style="margin-left:4px">Điều khoản dịch vụ &amp; Chính sách bảo mật</a>
                            </label>
                        </div>
                        
                        <button type="submit" class="btn-primary" id="regBtn">
                            Đăng ký
                        </button>
                    </form>
                </div>
            </div>
        </div>

                <!-- EMAIL VERIFY POPUP -->
        <div id="email-verify-popup" class="ev-overlay hidden" role="dialog" aria-modal="true">
            <div class="ev-modal">
                <button class="ev-close" id="ev-close" aria-label="Đóng">×</button>

                <div class="ev-icon">✉️</div>

                <h2>Xác thực email</h2>
                <p>
                    Mã xác thực đã được gửi đến email của bạn.<br />
                    Nhập 6 số bên dưới để kích hoạt tài khoản.
                </p>

                <div class="ev-code-inputs" id="ev-code-inputs">
                    <input maxlength="1" inputmode="numeric" />
                    <input maxlength="1" inputmode="numeric" />
                    <input maxlength="1" inputmode="numeric" />
                    <input maxlength="1" inputmode="numeric" />
                    <input maxlength="1" inputmode="numeric" />
                    <input maxlength="1" inputmode="numeric" />
                </div>

                <button id="ev-confirm" disabled>Xác thực</button>

                <div class="ev-actions">
                    <span>Không nhận được mã?</span>
                    <a href="#" id="ev-resend">Gửi lại</a>
                    <span id="ev-timer" class="ev-timer hidden">(30s)</span>
                </div>
            </div>
        </div>
        <script src="/public/JS/auth.js"></script>
    </body>
</html>
